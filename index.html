<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bé Học Chữ Cái - Vụn Vặt Project</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs" type="module"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --pastel-pink: #fce4ec;
            --pastel-blue: #e3f2fd;
            --pastel-green: #e8f5e9;
            --accent-color: #ff80ab;
            --text-color: #5d4037;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--pastel-pink), var(--pastel-blue));
            color: var(--text-color);
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Giao diện chính */
        #game-container {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; height: 100%; position: relative;
        }

        /* Thanh tiến trình & Điểm */
        .header {
            width: 90%; display: flex; justify-content: space-between;
            align-items: center; margin-top: 15px; z-index: 10;
        }
        #progress-bar {
            flex-grow: 1; height: 15px; background: white;
            border-radius: 10px; margin: 0 15px; overflow: hidden;
        }
        #progress-fill {
            width: 0%; height: 100%; background: var(--accent-color);
            transition: width 0.3s;
        }

        /* Nhân vật & Câu hỏi */
        .character-box { font-size: 50px; margin: 10px 0; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .question-text {
            font-size: 1.8rem; text-align: center; font-weight: bold;
            background: rgba(255, 255, 255, 0.7); padding: 10px 20px;
            border-radius: 20px; border: 3px dashed var(--accent-color);
            margin: 0 10px;
        }

        /* Khu vực đáp án */
        .options-area {
            display: flex; justify-content: space-around; width: 100%;
            margin-top: 30px; padding: 0 10px; box-sizing: border-box;
        }
        .option-card {
            width: 40%; aspect-ratio: 1/1; background: white;
            border-radius: 30px; display: flex; align-items: center;
            justify-content: center; font-size: 5rem; font-weight: bold;
            box-shadow: 0 8px 0 #ddd; border: 8px solid transparent;
            transition: all 0.2s; position: relative;
        }
        .option-card.active { border-color: #4caf50; transform: scale(1.05); }

        /* Camera & Điều khiển dự phòng */
        #cam-preview {
            position: absolute; bottom: 10px; right: 10px;
            width: 100px; height: 75px; border-radius: 10px;
            background: #000; transform: scaleX(-1); border: 2px solid white;
        }
        .controls-fallback {
            position: absolute; bottom: 30px; display: flex; gap: 50px;
        }
        .btn-manual {
            padding: 15px 30px; border-radius: 50px; border: none;
            background: var(--accent-color); color: white; font-weight: bold;
        }

        /* Lớp phủ (Start/End/Feedback) */
        .overlay {
            position: fixed; inset: 0; background: rgba(255,255,255,0.95);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; z-index: 100; text-align: center;
        }
        .btn-main {
            padding: 20px 60px; font-size: 1.5rem; border-radius: 50px;
            background: #4caf50; color: white; border: none; cursor: pointer;
            box-shadow: 0 6px 0 #2e7d32; margin-top: 20px;
        }
        
        #feedback-icon {
            position: absolute; font-size: 10rem; display: none; z-index: 200;
        }

        /* Hiệu ứng rung màn hình */
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">
        <div id="score-text">⭐: 0</div>
        <div id="progress-bar"><div id="progress-fill"></div></div>
    </div>

    <div class="character-box">🐰</div>
    <div class="question-text" id="question">Đang tải...</div>

    <div class="options-area">
        <div id="opt-L" class="option-card" onclick="checkAnswer('L')">?</div>
        <div id="opt-R" class="option-card" onclick="checkAnswer('R')">?</div>
    </div>

    <video id="webcam" style="display:none" autoplay playsinline></video>
    <canvas id="cam-preview"></canvas>

    <div class="controls-fallback">
        <button class="btn-manual" onclick="checkAnswer('L')">⬅️ Trái</button>
        <button class="btn-manual" onclick="checkAnswer('R')">Phải ➡️</button>
    </div>

    <div id="feedback-icon">❌</div>
</div>

<div id="start-screen" class="overlay">
    <h1 style="color: var(--accent-color); font-size: 3rem;">BÉ HỌC CHỮ CÁI</h1>
    <p>Nghiêng đầu sang trái hoặc phải để chọn đáp án nhé!</p>
    <div class="character-box" style="font-size: 100px;">🎨</div>
    <button class="btn-main" onclick="startGame()">BẮT ĐẦU</button>
</div>

<div id="end-screen" class="overlay" style="display: none;">
    <h1 id="final-status">HOÀN THÀNH!</h1>
    <p style="font-size: 1.5rem;">Số điểm của bé: <span id="final-score">0</span></p>
    <div class="character-box" style="font-size: 100px;">🏆</div>
    <button class="btn-main" onclick="location.reload()">CHƠI LẠI</button>
</div>
