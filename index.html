<!DOCTYPE html>
<html>
<head>
    <title>Bé học chữ cái - Nghiêng đầu chọn lựa</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker/face_landmarker.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            margin: 0; font-family: 'Arial', sans-serif; 
            background-color: #fce4ec; /* Màu hồng nhạt pastel bạn thích */
            display: flex; flex-direction: column; align-items: center; overflow: hidden;
        }
        #game-container { position: relative; width: 100vw; height: 100vh; text-align: center; }
        #video-container { position: absolute; top: 10px; right: 10px; width: 150px; border-radius: 10px; border: 3px solid white; transform: scaleX(-1); }
        
        .question { font-size: 3rem; color: #d81b60; margin-top: 50px; }
        .options-container { display: flex; justify-content: space-around; width: 100%; margin-top: 100px; }
        
        .option-box { 
            width: 300px; height: 300px; background: white; border-radius: 50px;
            display: flex; align-items: center; justify-content: center;
            font-size: 8rem; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 10px solid transparent; transition: all 0.3s;
        }
        .selecting-left { border-color: #4caf50; transform: scale(1.1); }
        .selecting-right { border-color: #4caf50; transform: scale(1.1); }
        
        #status-icon { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 200px; display: none; z-index: 100;
        }
    </style>
</head>
<body>

<div id="game-container">
    <video id="webcam" style="display:none" autoplay playsinline></video>
    <canvas id="video-container"></canvas>
    
    <div class="question" id="ques-text">Hãy chọn chữ a</div>
    
    <div class="options-container">
        <div id="opt-left" class="option-box">a</div>
        <div id="opt-right" class="option-box">ă</div>
    </div>

    <div id="status-icon">❌</div>
</div>

<script>
    const data = [
        { q: 'a', options: ['a', 'ă'] },
        { q: 'ă', options: ['ă', 'â'] },
        { q: 'â', options: ['â', 'ă'] },
        { q: 'b', options: ['b', 'd'] },
        { q: 'd', options: ['d', 'b'] },
        { q: 'đ', options: ['đ', 'd'] },
        { q: 'ô', options: ['ô', 'ư'] },
        { q: 'ư', options: ['ư', 'ô'] }
    ];

    let currentIdx = 0;
    let isProcessing = false;
    let tiltStatus = "neutral"; // left, right, neutral

    const quesText = document.getElementById('ques-text');
    const optLeft = document.getElementById('opt-left');
    const optRight = document.getElementById('opt-right');
    const statusIcon = document.getElementById('status-icon');

    // Hàm xáo trộn mảng
    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function loadQuestion() {
        const item = data[currentIdx];
        quesText.innerText = `Hãy chọn chữ ${item.q}`;
        const shuffled = shuffle([...item.options]);
        optLeft.innerText = shuffled[0];
        optRight.innerText = shuffled[1];
        isProcessing = false;
        statusIcon.style.display = 'none';
        optLeft.classList.remove('selecting-left');
        optRight.classList.remove('selecting-right');
    }

    async function onAnswer(selectedSide) {
        if (isProcessing) return;
        isProcessing = true;
        
        const selectedLetter = selectedSide === 'left' ? optLeft.innerText : optRight.innerText;
        const correctLetter = data[currentIdx].q;

        if (selectedLetter === correctLetter) {
            // Đúng: Pháo hoa
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            setTimeout(() => {
                currentIdx = (currentIdx + 1) % data.length;
                loadQuestion();
            }, 2000);
        } else {
            // Sai: Rung và hiện dấu X
            if (navigator.vibrate) navigator.vibrate(500);
            statusIcon.innerText = "❌";
            statusIcon.style.display = 'block';
            setTimeout(() => {
                statusIcon.style.display = 'none';
                isProcessing = false;
            }, 1000);
        }
    }

    // Logic MediaPipe để nhận diện nghiêng đầu
    // (Giả lập logic nhận diện đơn giản từ tọa độ mắt)
    function checkTilt(landmarks) {
        const leftEye = landmarks[33]; 
        const rightEye = landmarks[263];
        
        // Tính độ chênh lệch y giữa 2 mắt để biết độ nghiêng
        const diffY = leftEye.y - rightEye.y;

        if (diffY > 0.04) { // Nghiêng phải (tính theo gương là trái màn hình)
            optLeft.classList.add('selecting-left');
            optRight.classList.remove('selecting-right');
            return 'left';
        } else if (diffY < -0.04) { // Nghiêng trái
            optRight.classList.add('selecting-right');
            optLeft.classList.remove('selecting-left');
            return 'right';
        } else {
            optLeft.classList.remove('selecting-left');
            optRight.classList.remove('selecting-right');
            return 'neutral';
        }
    }

    // Khởi tạo Game
    loadQuestion();
    
    // Lưu ý: Phần khởi tạo FaceLandmarker thực tế cần file wasm và model. 
    // Linh có thể tích hợp đoạn script khởi tạo camera và detector của MediaPipe vào đây.
</script>
</body>
</html>
