<!DOCTYPE html><html lang='vi'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Bé 5 Tuổi Học Chữ Cái</title><style>body{margin:0;font-family:Arial;background:linear-gradient(135deg,#ffdff0,#dff9ff,#fff6cc);display:grid;place-items:center;padding:12px}.app{max-width:860px;width:100%;background:#fff;border-radius:30px;padding:18px;box-shadow:0 15px 35px rgba(0,0,0,.12)}h1{text-align:center;color:#ff4fa0}.q{text-align:center;font-size:30px;margin:12px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.ans{padding:22px;border-radius:22px;background:linear-gradient(135deg,#f5f5f5,#ffffff);text-align:center;font-size:58px;font-weight:700;cursor:pointer;transition:.2s}.ans:hover{transform:scale(1.03)}.btn{padding:12px 16px;border:0;border-radius:14px;font-weight:700;cursor:pointer;background:#ff8ec7;color:#fff}.reward{text-align:center;font-size:52px;height:60px}.mascot{text-align:center;font-size:72px}</style></head><body><div class='app' id='app'><h1>🌈 Bé Học Chữ Cái</h1><div class='mascot'>🐰</div><div style='text-align:center'><button class='btn' onclick='start()'>Bắt đầu</button></div><div class='q' id='q'>Sẵn sàng chưa nào?</div><div class='grid'><div class='ans' id='left' onclick='choose("left")'>A</div><div class='ans' id='right' onclick='choose("right")'>B</div></div><div class='reward' id='reward'></div></div><script>const quiz=[{ask:'Chữ nào là A?',a:'A',b:'B',c:'left'},{ask:'Chữ nào là B?',a:'D',b:'B',c:'right'},{ask:'Chữ nào là C?',a:'C',b:'G',c:'left'},{ask:'Chữ nào là M?',a:'N',b:'M',c:'right'},{ask:'Chữ nào là O?',a:'Q',b:'O',c:'right'},{ask:'Chữ nào là E?',a:'E',b:'F',c:'left'},{ask:'Chữ nào là H?',a:'K',b:'H',c:'right'},{ask:'Chữ nào là T?',a:'T',b:'Y',c:'left'}];let i=0;function speak(t){speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.lang='vi-VN';u.rate=.9;speechSynthesis.speak(u)}function fire(){for(let n=0;n<12;n++){let s=document.createElement('div');s.innerHTML='✨';s.style.position='fixed';s.style.left=Math.random()*100+'vw';s.style.top='20vh';s.style.fontSize='30px';s.style.transition='1s';document.body.appendChild(s);setTimeout(()=>{s.style.top='80vh';s.style.opacity='0';},50);setTimeout(()=>s.remove(),1100);}}function shake(){document.body.style.transform='translateX(8px)';setTimeout(()=>document.body.style.transform='translateX(-8px)',60);setTimeout(()=>document.body.style.transform='translateX(0)',120);if(navigator.vibrate)navigator.vibrate(200)}function load(){if(i>=quiz.length){app.innerHTML='<h1>🏆 Bé học giỏi quá!</h1><div class="mascot">🎁⭐🏅</div><div style="text-align:center"><button class="btn" onclick="location.reload()">Chơi lại</button></div>';speak('Bé học giỏi quá');return;}let x=quiz[i];left.innerHTML=x.a;right.innerHTML=x.b;q.innerHTML='Nghe và chọn chữ cái đúng';setTimeout(()=>speak(x.ask),300)}function choose(side){let ok=side===quiz[i].c;if(ok){reward.innerHTML='⭐';fire();speak('Đúng rồi giỏi lắm')}else{reward.innerHTML='💪';shake();speak('Thử lại nào')}setTimeout(()=>{reward.innerHTML='';i++;load()},1100)}function start(){i=0;load()}</script></body></html>
