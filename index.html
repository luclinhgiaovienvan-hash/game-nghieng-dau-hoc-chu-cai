<!DOCTYPE html>
<html lang='vi'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no'>
<title>Bé Học Chữ Cái - Fixed</title>
<script src='https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js'></script>
<style>
:root{--pink:#fce4ec;--blue:#e3f2fd;--accent:#ff80ab;--text:#5d4037}
html,body{margin:0;height:100%;font-family:Segoe UI,sans-serif;background:linear-gradient(135deg,var(--pink),var(--blue));overflow:hidden;color:var(--text)}
#game{display:flex;flex-direction:column;align-items:center;height:100%;padding:10px;box-sizing:border-box}.header{width:95%;display:flex;gap:10px;align-items:center}.bar{flex:1;height:14px;background:#fff;border-radius:999px;overflow:hidden}.fill{height:100%;width:0;background:var(--accent);transition:.3s}.card{font-size:52px}.q{font-size:1.7rem;font-weight:700;background:rgba(255,255,255,.7);padding:10px 16px;border-radius:18px;border:3px dashed var(--accent);margin:10px;text-align:center}.opts{display:flex;justify-content:space-around;width:100%;margin-top:20px}.opt{width:42%;aspect-ratio:1;background:#fff;border-radius:28px;display:flex;align-items:center;justify-content:center;font-size:5rem;font-weight:700;box-shadow:0 8px 0 #ddd;border:8px solid transparent;transition:.2s}.opt.active{border-color:#4caf50;transform:scale(1.05)}#cam{position:absolute;right:10px;bottom:10px;width:110px;height:82px;background:#000;border-radius:12px;border:2px solid #fff}.controls{position:absolute;left:0;right:0;bottom:18px;display:flex;justify-content:center;gap:20px}.btn{border:0;border-radius:40px;padding:14px 24px;background:var(--accent);color:#fff;font-weight:700}.overlay{position:fixed;inset:0;background:rgba(255,255,255,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9;text-align:center}.hide{display:none}.shake{animation:shake .45s}@keyframes shake{25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
</style>
</head>
<body>
<div id='game'>
<div class='header'><div id='score'>⭐ 0</div><div class='bar'><div class='fill' id='fill'></div></div></div>
<div class='card'>🐰</div>
<div class='q' id='question'>Nhấn bắt đầu</div>
<div class='opts'><div class='opt' id='L'>A</div><div class='opt' id='R'>B</div></div>
<video id='video' autoplay playsinline muted style='display:none'></video>
<canvas id='cam'></canvas>
<div class='controls'><button class='btn' onclick='choose("L")'>⬅️ Trái</button><button class='btn' onclick='choose("R")'>Phải ➡️</button></div>
</div>
<div id='start' class='overlay'><h1>BÉ HỌC CHỮ CÁI</h1><p>Xoay đầu hoặc bấm nút để chọn đáp án</p><button class='btn' onclick='startGame()'>BẮT ĐẦU</button></div>
<div id='end' class='overlay hide'><h1>🏆 Hoàn thành!</h1><p>Điểm: <span id='final'></span></p><button class='btn' onclick='location.reload()'>Chơi lại</button></div>
<script>
const data=[{q:'a',o:['a','ă'],c:'a'},{q:'ă',o:['ă','â'],c:'ă'},{q:'â',o:['â','ă'],c:'â'},{q:'b',o:['b','d'],c:'b'},{q:'d',o:['d','b'],c:'d'},{q:'đ',o:['đ','d'],c:'đ'}];
let arr=[],i=0,score=0,busy=false,last=0;
const video=document.getElementById('video'),cam=document.getElementById('cam'),ctx=cam.getContext('2d');
function speak(t){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='vi-VN';u.rate=.95;speechSynthesis.speak(u)}
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function startGame(){document.getElementById('start').classList.add('hide');arr=shuffle(data);load();startCam();}
function load(){busy=false;if(i>=arr.length)return endGame();let x=arr[i],op=shuffle(x.o);L.innerText=op[0];R.innerText=op[1];question.innerText='Hãy chọn chữ '+x.q;fill.style.width=((i+1)/arr.length*100)+'%';speak('Hãy chọn chữ '+x.q)}
async function startCam(){try{const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:640,height:480},audio:false});video.srcObject=stream;video.onloadeddata=loop;}catch(e){console.log(e);}}
function loop(){cam.width=video.videoWidth||320;cam.height=video.videoHeight||240;tick();}
function tick(){ctx.drawImage(video,0,0,cam.width,cam.height);requestAnimationFrame(tick)}
function choose(side){if(busy)return;busy=true;const pick=document.getElementById(side).innerText;const ok=pick===arr[i].c;if(ok){score+=10;scoreEl();confetti({particleCount:90,spread:70,origin:{y:.6}});speak('Đúng rồi giỏi lắm')}else{game.classList.add('shake');navigator.vibrate&&navigator.vibrate(250);speak('Sai rồi thử lại nhé')}setTimeout(()=>{game.classList.remove('shake');if(ok)i++;load();busy=false;},1200)}
function scoreEl(){score.innerText='⭐ '+score}
function endGame(){final.innerText=score;end.classList.remove('hide');speak('Chúc mừng bé hoàn thành trò chơi')}
// demo nghiêng đầu bằng orientation nếu có
window.addEventListener('deviceorientation',e=>{if(Date.now()-last<1200)return; if(e.gamma<-18){last=Date.now();choose('L')} else if(e.gamma>18){last=Date.now();choose('R')}})
</script>
</body>
</html>
